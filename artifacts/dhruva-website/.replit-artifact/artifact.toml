kind = "web"
previewPath = "/"
title = "Dhruva Technologies Website"
version = "1.0.0"
id = "artifacts/dhruva-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19210

[services.development]
run = "pnpm --filter @workspace/dhruva-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dhruva-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/dhruva-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19210"
BASE_PATH = "/"
